<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Broken Art Tattoo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0e0c0a !important;
      color: #f0ebe2;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.6;
    }

    /* Ambient glow */
    .glow {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196,75,43,0.12) 0%, transparent 70%);
      filter: blur(100px);
      top: -150px; right: -150px;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 10;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 20px) 28px env(safe-area-inset-bottom, 20px);
      gap: 0;
      text-align: center;
    }

    /* Studio name */
    .studio-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 10vw, 3.2rem);
      letter-spacing: 0.08em;
      color: #f0ebe2;
      line-height: 1;
      margin-bottom: 4px;
      animation: fadeUp 0.5s ease both;
    }
    .studio-name span { color: #c44b2b; }

    .studio-location {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #7a7065;
      margin-bottom: 32px;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    /* QR frame */
    .qr-wrap {
      background: #ffffff;
      padding: 16px;
      border-radius: 6px;
      box-shadow:
        0 0 0 1px rgba(196,75,43,0.3),
        0 30px 80px rgba(196,75,43,0.1),
        0 0 60px rgba(196,75,43,0.05);
      position: relative;
      margin-bottom: 28px;
      animation: popIn 0.5s 0.2s cubic-bezier(0.34, 1.3, 0.64, 1) both;
    }

    /* Corner brackets */
    .qr-wrap::before, .qr-wrap::after {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      border-color: #c44b2b;
      border-style: solid;
    }
    .qr-wrap::before { top: -5px; left: -5px; border-width: 2px 0 0 2px; border-radius: 2px 0 0 0; }
    .qr-wrap::after  { bottom: -5px; right: -5px; border-width: 0 2px 2px 0; border-radius: 0 0 2px 0; }

    #qr-canvas { display: block; }

    /* Scan prompt */
    .scan-prompt {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #7a7065;
      margin-bottom: 40px;
      animation: fadeUp 0.5s 0.35s ease both;
    }
    .scan-prompt span { color: #c44b2b; }

    /* Back button */
    .back-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #4a4540;
      background: none;
      border: 1px solid rgba(240,235,226,0.08);
      padding: 10px 24px;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
      animation: fadeUp 0.5s 0.45s ease both;
    }
    .back-btn:hover { color: #f0ebe2; border-color: rgba(240,235,226,0.2); }

    /* WOTS footer */
    .wots-footer {
      position: fixed;
      bottom: env(safe-area-inset-bottom, 16px);
      left: 0; right: 0;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #2a2520;
      animation: fadeUp 0.5s 0.5s ease both;
    }
    .wots-footer span { color: #3a3530; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="glow"></div>

  <div class="page">
    <div class="studio-name">Broken <span>Art</span> Tattoo</div>
    <div class="studio-location">Los Angeles · Custom Tattoo Studio</div>

    <div class="qr-wrap">
      <div id="qr-canvas"></div>
    </div>

    <div class="scan-prompt">Scan to <span>book</span> or learn more</div>

    <a class="back-btn" id="back-btn" href="/ambassador/">← Back to Dashboard</a>
  </div>

  <div class="wots-footer">Powered by <span>WordOnTheStreet</span></div>

  <script>
    // ── Parse ref code from URL ───────────────────────────────
    const params  = new URLSearchParams(window.location.search);
    const refCode = params.get('ref') || 'demo';
    const refUrl  = `https://wotsworks.com/r/?ref=${refCode}`;

    // ── Update back button to preserve ref ───────────────────
document.getElementById('back-btn').href = `/a/?ref=${refCode}`;
    // ── Generate QR ──────────────────────────────────────────
    const size = Math.min(window.innerWidth - 96, 280);
    new QRCode(document.getElementById('qr-canvas'), {
      text:         refUrl,
      width:        size,
      height:       size,
      colorDark:    '#0e0c0a',
      colorLight:   '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>

</body>
</html>
